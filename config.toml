# The URL the site will be built for
base_url = "https://jiaxiang.wang"

title = "个人主页"

author = "王嘉祥"

description = "好奇、探索、创造。个人主页导航网站。"

default_language = "zh"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

minify_html = true

[languages.en]
title = "Homepage"
description = "Curiosity, exploration, creation. Personal homepage."

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = false

[extra]

[extra.site]
start_year = 2024
logo = "/img/logo.webp"
# default to use logo value
nav_logo = "/img/logo.webp"
# 联系邮箱
mail = "contact@example.com"
# ICP 备案号
compliance_icp = "ICP备XXXXXXXX号"
# 公安备案号
compliance_security = "公网安备0000000000号"
# 公安备案链接
compliance_security_link = "https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=0000000000"


# umami 访问量统计
[extra.analytics.umami]
enable = false
# 生效的域名，避免被 localhost 统计
domain = "example.com"
# 自己的umami服务地址
remote_url = "https://umami-api"
#remote_url = "https://umami-wangjiaxiang-d12g.netlify.app"
# 网站id
id = "5c123448-a501-444c-830a-e55df930cd4a"
# js 加载地址
js = "/path/to/script.js"

# 其他设置
[extra.other]
# AVIF 图片优化，大幅降低图片尺寸
avif_enable = true

# 多语言检测提示（全局字典，渲染为内联 JS）
[extra.i18n_detect.zh]
message = "此页面也有中文版本"
action = "切换"
lang_name = "中文"
url = "/"
[extra.i18n_detect.en]
message = "This page is also available in English"
action = "Switch"
lang_name = "English"
url = "/en/"
