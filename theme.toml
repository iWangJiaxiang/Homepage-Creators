name = "homepage-creators"
description = "A fast and beautiful personal homepage for creators, used by https://jiaxiang.wang, a port of HeoWeb."
license = "AGPL"
homepage = "https://github.com/iWangJiaxiang/homepage-for-creators"
min_version = "0.19.2"
demo = "https://jiaxiang.wang/"

[author]
name = "Jiaxiang Wang"
homepage = "https://blog.jiaxiang.wang"

[original]
author =  "Heo Hong Zhang"
homepage = "https://github.com/zhheo"
repo = "https://github.com/zhheo/HeoWeb"

[extra]

[extra.site]
start_year = 2024
logo = "/img/logo.webp"
# default to use logo value
nav_logo = "/img/logo.webp"
# 联系邮箱
mail = "contact@example.com"
# ICP 备案号
compliance_icp = "ICP备XXXXXXXX号"
# 公安备案号
compliance_security = "公网安备0000000000号"
# 公安备案链接
compliance_security_link = "https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=0000000000"


# umami 访问量统计
[extra.analytics.umami]
enable = false
# 生效的域名，避免被 localhost 统计
domain = "example.com"
# 自己的umami服务地址
remote_url = "https://umami-api"
#remote_url = "https://umami-wangjiaxiang-d12g.netlify.app"
# 网站id
id = "5c123448-a501-444c-830a-e55df930cd4a"
# js 加载地址
js = "/path/to/script.js"

[extra.nav]

[extra.nav.message]
enable = true
# support inline html
text = "🎉 访问作者博客"
url = "https://blog.jiaxiang.wang"

[extra.nav.center]
menus = [
    { name = "主页", url = "主页", internal = true},
    { name = "主题", url = "主题", internal = true},
    { name = "博客", url = "博客", internal = true},
    { name = "媒体", url = "媒体", internal = true},
    { name = "项目", url = "https://blog.jiaxiang.wang/tags/project/", internal = false},
]

[extra.nav.right]
menus = [
    { name = "作者博客", url = "https://blog.jiaxiang.wang", internal = false},
    { name = "作者 Github", url = "https://github.com/iWangJiaxiang", internal = false},
]

# 其他设置
[extra.other]
# AVIF 图片优化，大幅降低图片尺寸
avif_enable = true

# 多语言检测提示（全局字典，渲染为内联 JS）
[extra.i18n_detect.zh]
message = "此页面也有中文版本"
action = "切换"
lang_name = "中文"
url = "/"
[extra.i18n_detect.en]
message = "This page is also available in English"
action = "Switch"
lang_name = "English"
url = "/en/"
